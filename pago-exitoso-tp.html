<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Pago exitoso! · Trabajo País 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .icon-wrap {
    width: 72px;
    height: 72px;
    background: #f0fdf4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }

  .icon-wrap svg { width: 38px; height: 38px; }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    font-size: 15px;
    color: #6b7280;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .info-box {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    text-align: left;
  }

  .info-box p { font-size: 13px; color: #166534; line-height: 1.6; }
  .info-box strong { font-weight: 600; }

  .btn-primary {
    display: block;
    width: 100%;
    padding: 13px;
    background: #14569c;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 0.75rem;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: #0e3d72; }

  .footer-note {
    margin-top: 2rem;
    font-size: 13px;
    color: #6b7280;
    line-height: 1.6;
  }

  .footer-note a {
    color: #14569c;
    font-weight: 600;
    text-decoration: none;
  }

  .footer-note a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <path d="M7.5 12l3 3 6-6" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1 class="title">¡Tu pago fue exitoso!</h1>

  <p class="subtitle">
    Gracias por tu donación a Trabajo País 2026.<br>
    Tu aporte hace posible construir lugares de encuentro a lo largo de Chile.
  </p>

  <a href="https://www.trabajopais.cl" class="btn-primary">
    ¡Conoce más sobre Trabajo País 2026!
  </a>

  <p class="footer-note">
    ¿Tienes alguna duda? Escríbenos a <a href="mailto:finanzas@trabajopais.cl">finanzas@trabajopais.cl</a>
  </p>

</div>

</body>
</html>
